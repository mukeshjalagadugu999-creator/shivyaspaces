<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/static/Shivya_Logo.jpeg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — ShivyaSpaces</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        min-height: 100vh;
      }
      body {
        font-family: "Inter", sans-serif;
        background:
          linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.78)),
          url("https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?w=1600")
            center/cover fixed;
        color: white;
        display: flex;
        flex-direction: column;
      }
      .navbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 64px;
        display: flex;
        align-items: center;
        padding: 0 40px;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        z-index: 1000;
      }
      .nav-logo {
        display: flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
      }
      .nav-logo img {
        height: 36px;
        width: 36px;
        border-radius: 50%;
        border: 1.5px solid #d4a017;
        object-fit: contain;
      }
      .nav-logo-text {
        display: flex;
        flex-direction: column;
        gap: 1px;
      }
      .nav-logo-name {
        font-size: 14px;
        font-weight: 800;
        color: white;
        letter-spacing: 0.8px;
        line-height: 1;
      }
      .nav-logo-name span {
        color: #d4a017;
      }
      .nav-logo-sub {
        font-size: 9px;
        color: rgba(255, 255, 255, 0.42);
      }
      .main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 80px 24px 40px;
        text-align: center;
      }
      .card {
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 20px;
        padding: 48px 40px;
        max-width: 480px;
        width: 100%;
        backdrop-filter: blur(12px);
      }
      .num {
        font-family: "Playfair Display", serif;
        font-size: 96px;
        font-weight: 800;
        color: #d4a017;
        line-height: 1;
        margin-bottom: 12px;
      }
      h1 {
        font-size: 24px;
        font-weight: 700;
        color: white;
        margin-bottom: 10px;
      }
      p {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.55);
        line-height: 1.7;
        margin-bottom: 28px;
      }
      .btn {
        display: inline-block;
        background: #d4a017;
        color: #1a0a00;
        text-decoration: none;
        padding: 12px 28px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 700;
        transition: all 0.18s;
        margin: 4px;
      }
      .btn:hover {
        background: #c49010;
      }
      .btn-ghost {
        background: rgba(255, 255, 255, 0.08);
        color: white;
        border: 1px solid rgba(255, 255, 255, 0.18);
      }
      .btn-ghost:hover {
        background: rgba(255, 255, 255, 0.15);
      }
      .page-footer {
        padding: 16px 40px;
        text-align: center;
        background: rgba(0, 0, 0, 0.45);
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }
      .page-footer p {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.3);
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <a href="/" class="nav-logo">
        <img src="/static/Shivya_Logo.jpeg" alt="ShivyaSpaces" />
        <div class="nav-logo-text">
          <span class="nav-logo-name">SHIVYA<span>SPACES</span></span>
          <span class="nav-logo-sub">Trusted Rental Lifecycle Platform</span>
        </div>
      </a>
    </nav>
    <div class="main">
      <div class="card">
        <div class="num">404</div>
        <h1>Page Not Found</h1>
        <p>The page you're looking for doesn't exist or may have been moved.</p>
        <div>
          <a href="/" class="btn">Go Home</a>
          <a href="/results" class="btn btn-ghost">Browse Properties</a>
        </div>
      </div>
    </div>
    <footer class="page-footer">
      <p>© <span class="yr"></span> Shivya Spaces. All Rights Reserved.</p>
    </footer>
    <script>
      document
        .querySelectorAll(".yr")
        .forEach((e) => (e.textContent = new Date().getFullYear()));
    </script>
  </body>
</html>
