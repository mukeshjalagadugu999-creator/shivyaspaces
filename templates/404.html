<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/static/Shivya_Logo_Round.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found — ShivyaSpaces</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="/static/theme.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --bg: #f8fafc;
        --bg2: #ffffff;
        --border: #e5e7eb;
        --text: #111827;
        --text2: #4b5563;
        --text3: #9ca3af;
        --accent: #2563eb;
        --accent-hover: #1d4ed8;
      }
      [data-theme="dark"] {
        --bg: #0d1117;
        --bg2: #161b22;
        --border: #30363d;
        --text: #e6edf3;
        --text2: #8b949e;
        --text3: #484f58;
        --accent: #58a6ff;
        --accent-hover: #79b8ff;
      }
      body {
        font-family: "Inter", sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        color: var(--text);
        transition:
          background 0.25s,
          color 0.25s;
        padding: 24px;
        text-align: center;
      }
      .container {
        max-width: 480px;
        width: 100%;
      }
      .code {
        font-size: 96px;
        font-weight: 800;
        color: var(--border);
        line-height: 1;
        margin-bottom: 24px;
        letter-spacing: -4px;
        font-family: "Playfair Display", serif;
      }
      h1 {
        font-family: "Playfair Display", serif;
        font-size: 28px;
        font-weight: 700;
        color: var(--text);
        margin-bottom: 12px;
      }
      p {
        font-size: 15px;
        color: var(--text3);
        line-height: 1.7;
        margin-bottom: 36px;
      }
      .btn-home {
        display: inline-block;
        background: var(--accent);
        color: white;
        text-decoration: none;
        padding: 13px 32px;
        border-radius: 12px;
        font-size: 14px;
        font-weight: 600;
        transition: background 0.18s;
        margin-bottom: 12px;
      }
      .btn-home:hover {
        background: var(--accent-hover);
      }
      .btn-search {
        display: inline-block;
        background: none;
        color: var(--text3);
        text-decoration: none;
        padding: 13px 24px;
        border-radius: 12px;
        font-size: 14px;
        font-weight: 500;
        border: 1px solid var(--border);
        margin-left: 8px;
        transition: all 0.18s;
      }
      .btn-search:hover {
        color: var(--text);
        border-color: var(--text3);
      }
      /* === UNIVERSAL BACKGROUND === */
      body {
        min-height: 100vh;
        background:
          linear-gradient(rgba(0, 0, 0, 0.72), rgba(0, 0, 0, 0.75)),
          url("https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?w=1600") !important;
        background-size: cover !important;
        background-position: center !important;
        background-attachment: fixed !important;
      }
      body {
        min-height: 100vh;
        background:
          linear-gradient(rgba(0, 0, 0, 0.72), rgba(0, 0, 0, 0.75)),
          url("https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?w=1600") !important;
        background-size: cover !important;
        background-position: center !important;
        background-attachment: fixed !important;
        color: white;
      }

      /* ===== DARK PAGE OVERRIDES ===== */
      body {
        background:
          linear-gradient(rgba(0, 0, 0, 0.72), rgba(0, 0, 0, 0.75)),
          url("https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?w=1600") !important;
        background-size: cover !important;
        background-position: center !important;
        background-attachment: fixed !important;
        color: white !important;
      }
      .navbar {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        right: 0 !important;
        height: 68px !important;
        display: flex !important;
        align-items: center !important;
        padding: 0 40px !important;
        background: rgba(0, 0, 0, 0.55) !important;
        backdrop-filter: blur(16px) !important;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
        z-index: 999 !important;
      }
      .nav-logo {
        display: flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
      }
      .nav-logo img {
        height: 38px;
        width: 38px;
        object-fit: contain;
        border-radius: 50%;
        border: 1.5px solid #d4a017;
      }
      .nav-logo-name {
        font-size: 15px;
        font-weight: 700;
        color: white !important;
        letter-spacing: 0.5px;
        line-height: 1;
      }
      .nav-accent {
        color: #d4a017 !important;
      }
      .nav-logo-tagline {
        font-size: 9px;
        color: rgba(255, 255, 255, 0.45);
      }
      .nav-right {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .nav-btn {
        font-size: 13px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.75) !important;
        text-decoration: none;
        padding: 7px 14px;
        border-radius: 7px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        background: rgba(255, 255, 255, 0.08);
        transition: all 0.18s;
        cursor: pointer;
        font-family: "Inter", sans-serif;
        white-space: nowrap;
      }
      /* Glass cards */
      .card,
      .form-card,
      .tile,
      .filter-card,
      .glass-card {
        background: rgba(255, 255, 255, 0.08) !important;
        border: 1px solid rgba(255, 255, 255, 0.15) !important;
        backdrop-filter: blur(10px) !important;
        color: white !important;
      }
      /* Inputs inside dark pages */
      input,
      select,
      textarea {
        background: rgba(255, 255, 255, 0.1) !important;
        border: 1px solid rgba(255, 255, 255, 0.2) !important;
        color: white !important;
      }
      input::placeholder,
      textarea::placeholder {
        color: rgba(255, 255, 255, 0.4) !important;
      }
      select option {
        background: #1a1008;
        color: white;
      }
      label {
        color: rgba(255, 255, 255, 0.7) !important;
      }
      /* Ensure content starts below navbar */
      .page-body,
      .page,
      .content,
      .results-content,
      .results-wrapper {
        padding-top: 88px !important;
      }
      .results-bar {
        top: 68px !important;
        background: rgba(0, 0, 0, 0.5) !important;
        backdrop-filter: blur(12px) !important;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
      }
      .results-bar-inner h1,
      .results-meta h1 {
        color: white !important;
      }
      .results-meta p {
        color: rgba(255, 255, 255, 0.5) !important;
      }
      /* Group select */
      .group-select {
        background: rgba(255, 255, 255, 0.1) !important;
        border: 1.5px solid rgba(255, 255, 255, 0.2) !important;
        color: white !important;
      }
      .control-label {
        color: rgba(255, 255, 255, 0.5) !important;
      }
      .refine-btn {
        background: rgba(255, 255, 255, 0.1) !important;
        border: 1px solid rgba(255, 255, 255, 0.2) !important;
        color: white !important;
      }
      /* Property cards */
      .grid .tile {
        background: rgba(255, 255, 255, 0.07) !important;
        border: 1px solid rgba(255, 255, 255, 0.12) !important;
        backdrop-filter: blur(8px) !important;
      }
      .tile:hover {
        background: rgba(255, 255, 255, 0.12) !important;
        border-color: rgba(212, 160, 23, 0.5) !important;
      }
      .tile-info {
        background: rgba(0, 0, 0, 0.3) !important;
      }
      .card-price {
        color: white !important;
      }
      .tile-info h2 {
        color: white !important;
      }
      .location {
        color: rgba(255, 255, 255, 0.6) !important;
      }
      .meta div {
        background: rgba(255, 255, 255, 0.12) !important;
        color: rgba(255, 255, 255, 0.7) !important;
        border: none !important;
      }
      /* Section titles */
      h1,
      h2,
      h3 {
        color: white !important;
      }
      p {
        color: rgba(255, 255, 255, 0.7);
      }
      /* Footer */
      .page-footer {
        padding: 18px 40px;
        text-align: center;
        background: rgba(0, 0, 0, 0.45);
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }
      .page-footer p {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.35);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="code">404</div>
      <h1>Page Not Found</h1>
      <p>The page you're looking for doesn't exist or may have been moved.</p>
      <a href="/" class="btn-home">Go to Home</a>
      <a href="/search" class="btn-search">Search Properties</a>
    </div>
    <footer class="page-footer">
      <p>© <span class="yr"></span> Shivya Spaces. All Rights Reserved.</p>
    </footer>
    <script>
      document
        .querySelectorAll(".yr")
        .forEach((e) => (e.textContent = new Date().getFullYear()));
    </script>
  </body>
</html>
