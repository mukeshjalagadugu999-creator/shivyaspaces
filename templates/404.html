<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/static/Shivya_Logo.jpeg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found — ShivyaSpaces</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="/static/theme.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --bg: #f8fafc;
        --bg2: #ffffff;
        --border: #e5e7eb;
        --text: #111827;
        --text2: #4b5563;
        --text3: #9ca3af;
        --accent: #2563eb;
        --accent-hover: #1d4ed8;
      }
      [data-theme="dark"] {
        --bg: #0d1117;
        --bg2: #161b22;
        --border: #30363d;
        --text: #e6edf3;
        --text2: #8b949e;
        --text3: #484f58;
        --accent: #58a6ff;
        --accent-hover: #79b8ff;
      }
      body {
        font-family: "Inter", sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        color: var(--text);
        transition:
          background 0.25s,
          color 0.25s;
        padding: 24px;
        text-align: center;
      }
      .container {
        max-width: 480px;
        width: 100%;
      }
      .code {
        font-size: 96px;
        font-weight: 800;
        color: var(--border);
        line-height: 1;
        margin-bottom: 24px;
        letter-spacing: -4px;
        font-family: "Playfair Display", serif;
      }
      h1 {
        font-family: "Playfair Display", serif;
        font-size: 28px;
        font-weight: 700;
        color: var(--text);
        margin-bottom: 12px;
      }
      p {
        font-size: 15px;
        color: var(--text3);
        line-height: 1.7;
        margin-bottom: 36px;
      }
      .btn-home {
        display: inline-block;
        background: var(--accent);
        color: white;
        text-decoration: none;
        padding: 13px 32px;
        border-radius: 12px;
        font-size: 14px;
        font-weight: 600;
        transition: background 0.18s;
        margin-bottom: 12px;
      }
      .btn-home:hover {
        background: var(--accent-hover);
      }
      .btn-search {
        display: inline-block;
        background: none;
        color: var(--text3);
        text-decoration: none;
        padding: 13px 24px;
        border-radius: 12px;
        font-size: 14px;
        font-weight: 500;
        border: 1px solid var(--border);
        margin-left: 8px;
        transition: all 0.18s;
      }
      .btn-search:hover {
        color: var(--text);
        border-color: var(--text3);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="code">404</div>
      <h1>Page Not Found</h1>
      <p>The page you're looking for doesn't exist or may have been moved.</p>
      <a href="/" class="btn-home">Go to Home</a>
      <a href="/search" class="btn-search">Search Properties</a>
    </div>
  </body>
</html>
