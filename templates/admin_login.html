<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/static/Shivya_Logo.jpeg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login — ShivyaSpaces</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        min-height: 100vh;
      }
      body {
        font-family: "Inter", sans-serif;
        background:
          linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.78)),
          url("https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?w=1600")
            center/cover fixed;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .box {
        background: rgba(255, 255, 255, 0.07);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 20px;
        padding: 40px 36px;
        width: 100%;
        max-width: 400px;
        backdrop-filter: blur(14px);
      }
      .brand-row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 6px;
      }
      .brand-row img {
        height: 44px;
        width: 44px;
        border-radius: 50%;
        border: 2px solid #d4a017;
        object-fit: contain;
        flex-shrink: 0;
      }
      .brand-name {
        font-size: 18px;
        font-weight: 800;
        color: white;
        letter-spacing: 0.8px;
      }
      .brand-name span {
        color: #d4a017;
      }
      .admin-badge {
        font-size: 10px;
        background: #8b1e3f;
        color: white;
        padding: 3px 9px;
        border-radius: 999px;
        font-weight: 700;
        letter-spacing: 0.5px;
        margin-left: 6px;
        vertical-align: middle;
      }
      .sub {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.45);
        margin-bottom: 28px;
        margin-top: 4px;
      }
      .flash {
        padding: 10px 14px;
        border-radius: 10px;
        font-size: 13px;
        margin-bottom: 18px;
        font-weight: 500;
      }
      .flash.danger {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: #fca5a5;
      }
      .flash.success {
        background: rgba(34, 197, 94, 0.15);
        border: 1px solid rgba(34, 197, 94, 0.3);
        color: #86efac;
      }
      label {
        display: block;
        font-size: 11px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.5);
        text-transform: uppercase;
        letter-spacing: 0.8px;
        margin-bottom: 6px;
      }
      input {
        width: 100%;
        padding: 12px 14px;
        border: 1.5px solid rgba(255, 255, 255, 0.18);
        border-radius: 10px;
        font-size: 14px;
        font-family: "Inter", sans-serif;
        color: white;
        background: rgba(255, 255, 255, 0.08);
        margin-bottom: 18px;
        outline: none;
        transition: border-color 0.18s;
      }
      input::placeholder {
        color: rgba(255, 255, 255, 0.35);
      }
      input:focus {
        border-color: #d4a017;
      }
      .btn {
        width: 100%;
        background: #8b1e3f;
        color: white;
        border: none;
        padding: 13px;
        border-radius: 12px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        font-family: "Inter", sans-serif;
        transition: background 0.18s;
      }
      .btn:hover {
        background: #7a1a37;
      }
      .footer-row {
        display: flex;
        align-items: center;
        justify-content: center;
        margin-top: 20px;
      }
      .back-link {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.45);
        text-decoration: none;
      }
      .back-link:hover {
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <div class="brand-row">
        <img src="/static/Shivya_Logo.jpeg" alt="ShivyaSpaces" />
        <div>
          <span class="brand-name">SHIVYA<span>SPACES</span></span>
          <span class="admin-badge">ADMIN</span>
        </div>
      </div>
      <p class="sub">Admin portal — restricted access</p>

      {% with messages = get_flashed_messages(with_categories=true) %} {% for
      category, message in messages %}
      <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %} {% endwith %}

      <form method="POST" action="/admin/login">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
        <label>Email</label>
        <input
          type="email"
          name="email"
          placeholder="admin@platform.com"
          required
          autocomplete="email"
        />
        <label>Password</label>
        <input
          type="password"
          name="password"
          placeholder="••••••••"
          required
        />
        <button type="submit" class="btn">Sign In</button>
      </form>

      <div class="footer-row">
        <a href="/" class="back-link">← Back to home</a>
      </div>
    </div>
    <footer
      style="
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 12px 40px;
        text-align: center;
        background: rgba(0, 0, 0, 0.45);
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      "
    >
      <p style="font-size: 12px; color: rgba(255, 255, 255, 0.3)">
        © <span class="yr"></span> Shivya Spaces. All Rights Reserved.
      </p>
    </footer>
    <script>
      document
        .querySelectorAll(".yr")
        .forEach((e) => (e.textContent = new Date().getFullYear()));
    </script>
  </body>
</html>
