<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/static/Shivya_Logo_Round.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login — ShivyaSpaces</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="/static/theme.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --bg: #f8fafc;
        --bg2: #ffffff;
        --border: #e5e7eb;
        --text: #111827;
        --text2: #4b5563;
        --text3: #9ca3af;
        --accent: #7c3aed;
        --accent-hover: #6d28d9;
        --input-bg: #ffffff;
        --input-border: #e5e7eb;
        --red-bg: #fee2e2;
        --red-fg: #991b1b;
        --green-bg: #dcfce7;
        --green-fg: #166534;
      }
      [data-theme="dark"] {
        --bg: #0d1117;
        --bg2: #161b22;
        --border: #30363d;
        --text: #e6edf3;
        --text2: #8b949e;
        --text3: #484f58;
        --accent: #a78bfa;
        --accent-hover: #8b5cf6;
        --input-bg: #0d1117;
        --input-border: #30363d;
        --red-bg: #2d1215;
        --red-fg: #f85149;
        --green-bg: #0d2b1a;
        --green-fg: #3fb950;
      }
      body {
        font-family: "Inter", sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        color: var(--text);
        transition:
          background 0.25s,
          color 0.25s;
        padding: 24px;
      }
      .box {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 40px 36px;
        width: 100%;
        max-width: 400px;
        box-shadow:
          0 4px 6px rgba(0, 0, 0, 0.04),
          0 12px 28px rgba(0, 0, 0, 0.08);
        transition:
          background 0.25s,
          border-color 0.25s;
      }
      .admin-badge {
        display: inline-block;
        background: var(--accent);
        color: white;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        padding: 4px 12px;
        border-radius: 999px;
        margin-bottom: 16px;
      }
      .brand {
        font-family: "Playfair Display", serif;
        font-size: 22px;
        font-weight: 700;
        color: var(--text);
        margin-bottom: 4px;
      }
      .sub {
        font-size: 13px;
        color: var(--text3);
        margin-bottom: 28px;
      }
      .flash {
        padding: 10px 14px;
        border-radius: 10px;
        font-size: 13px;
        margin-bottom: 18px;
        font-weight: 500;
      }
      .flash.danger {
        background: var(--red-bg);
        color: var(--red-fg);
      }
      .flash.success {
        background: var(--green-bg);
        color: var(--green-fg);
      }
      label {
        display: block;
        font-size: 11px;
        font-weight: 600;
        color: var(--text3);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 6px;
      }
      input {
        width: 100%;
        padding: 12px 14px;
        border: 1.5px solid var(--input-border);
        border-radius: 10px;
        font-size: 14px;
        font-family: "Inter", sans-serif;
        color: var(--text);
        background: var(--input-bg);
        margin-bottom: 18px;
        outline: none;
        transition:
          border-color 0.18s,
          background 0.25s,
          color 0.25s;
      }
      input:focus {
        border-color: var(--accent);
      }
      .btn {
        width: 100%;
        background: var(--accent);
        color: white;
        border: none;
        padding: 13px;
        border-radius: 12px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        font-family: "Inter", sans-serif;
        transition: background 0.18s;
      }
      .btn:hover {
        background: var(--accent-hover);
      }
      .footer-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 20px;
      }
      .back-link {
        font-size: 13px;
        color: var(--text3);
        text-decoration: none;
        transition: color 0.18s;
      }
      .back-link:hover {
        color: var(--text);
      }

      /* === UNIVERSAL NAVBAR === */
      .navbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 68px;
        display: flex;
        align-items: center;
        padding: 0 40px;
        background: rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(16px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        z-index: 999;
      }
      .nav-logo {
        display: flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
      }
      .nav-logo img {
        height: 38px;
        width: 38px;
        object-fit: contain;
        border-radius: 50%;
        border: 1.5px solid #d4a017;
        flex-shrink: 0;
      }
      .nav-logo-text {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .nav-logo-name {
        font-size: 15px;
        font-weight: 700;
        color: white;
        letter-spacing: 0.5px;
        line-height: 1;
      }
      .nav-accent {
        color: #d4a017;
      }
      .nav-logo-tagline {
        font-size: 9px;
        color: rgba(255, 255, 255, 0.45);
        letter-spacing: 0.2px;
        line-height: 1;
      }
      /* === UNIVERSAL FOOTER === */
      .page-footer {
        padding: 18px 40px;
        text-align: center;
        background: rgba(0, 0, 0, 0.4);
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }
      .page-footer p {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.35);
      }
      /* === UNIVERSAL BACKGROUND === */
      body {
        min-height: 100vh;
        background:
          linear-gradient(rgba(0, 0, 0, 0.72), rgba(0, 0, 0, 0.75)),
          url("https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?w=1600") !important;
        background-size: cover !important;
        background-position: center !important;
        background-attachment: fixed !important;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <span class="admin-badge">Admin</span>
      <p class="brand">Platform Admin</p>
      <p class="sub">Sign in to manage owners and platform settings.</p>
      {% with messages = get_flashed_messages(with_categories=true) %} {% for
      category, message in messages %}
      <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %} {% endwith %}
      <form method="POST" action="/admin/login">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
        <label>Email Address</label>
        <input
          type="email"
          name="email"
          placeholder="admin@platform.com"
          required
        />
        <label>Password</label>
        <input
          type="password"
          name="password"
          placeholder="••••••••"
          required
        />
        <button type="submit" class="btn">Sign In</button>
      </form>
      <div class="footer-row">
        <a href="/" class="back-link">Back to home</a>
      </div>
    </div>
    <footer class="page-footer">
      <p>© <span class="yr"></span> Shivya Spaces. All Rights Reserved.</p>
    </footer>
    <script>
      document
        .querySelectorAll(".yr")
        .forEach((e) => (e.textContent = new Date().getFullYear()));
    </script>
  </body>
</html>
