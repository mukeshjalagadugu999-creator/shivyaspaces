<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/static/Shivya_Logo.jpeg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login — ShivyaSpaces</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="/static/theme.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --bg: #f8fafc;
        --bg2: #ffffff;
        --border: #e5e7eb;
        --text: #111827;
        --text2: #4b5563;
        --text3: #9ca3af;
        --accent: #7c3aed;
        --accent-hover: #6d28d9;
        --input-bg: #ffffff;
        --input-border: #e5e7eb;
        --red-bg: #fee2e2;
        --red-fg: #991b1b;
        --green-bg: #dcfce7;
        --green-fg: #166534;
      }
      [data-theme="dark"] {
        --bg: #0d1117;
        --bg2: #161b22;
        --border: #30363d;
        --text: #e6edf3;
        --text2: #8b949e;
        --text3: #484f58;
        --accent: #a78bfa;
        --accent-hover: #8b5cf6;
        --input-bg: #0d1117;
        --input-border: #30363d;
        --red-bg: #2d1215;
        --red-fg: #f85149;
        --green-bg: #0d2b1a;
        --green-fg: #3fb950;
      }
      body {
        font-family: "Inter", sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        color: var(--text);
        transition:
          background 0.25s,
          color 0.25s;
        padding: 88px 24px 24px;
      }
      .box {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 40px 36px;
        width: 100%;
        max-width: 400px;
        box-shadow:
          0 4px 6px rgba(0, 0, 0, 0.04),
          0 12px 28px rgba(0, 0, 0, 0.08);
        transition:
          background 0.25s,
          border-color 0.25s;
      }
      .admin-badge {
        display: inline-block;
        background: var(--accent);
        color: white;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        padding: 4px 12px;
        border-radius: 999px;
        margin-bottom: 16px;
      }
      .brand {
        font-family: "Inter", sans-serif;
        font-size: 18px;
        font-weight: 800;
        color: #1f2937;
        margin-bottom: 4px;
        letter-spacing: 0.5px;
      }
      .sub {
        font-size: 13px;
        color: var(--text3);
        margin-bottom: 28px;
      }
      .flash {
        padding: 10px 14px;
        border-radius: 10px;
        font-size: 13px;
        margin-bottom: 18px;
        font-weight: 500;
      }
      .flash.danger {
        background: var(--red-bg);
        color: var(--red-fg);
      }
      .flash.success {
        background: var(--green-bg);
        color: var(--green-fg);
      }
      label {
        display: block;
        font-size: 11px;
        font-weight: 600;
        color: var(--text3);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 6px;
      }
      input {
        width: 100%;
        padding: 12px 14px;
        border: 1.5px solid var(--input-border);
        border-radius: 10px;
        font-size: 14px;
        font-family: "Inter", sans-serif;
        color: var(--text);
        background: var(--input-bg);
        margin-bottom: 18px;
        outline: none;
        transition:
          border-color 0.18s,
          background 0.25s,
          color 0.25s;
      }
      input:focus {
        border-color: var(--accent);
      }
      .btn {
        width: 100%;
        background: #8b1e3f;
        color: white;
        border: none;
        padding: 13px;
        border-radius: 12px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        font-family: "Inter", sans-serif;
        transition: background 0.18s;
      }
      .btn:hover {
        background: #7a1a37;
      }
      .footer-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 20px;
      }
      .back-link {
        font-size: 13px;
        color: var(--text3);
        text-decoration: none;
        transition: color 0.18s;
      }
      .back-link:hover {
        color: var(--text);
      }
      /* === UNIVERSAL BACKGROUND === */

      /* ===== DARK THEME OVERRIDE ===== */
      html,
      body {
        min-height: 100vh;
      }
      body {
        background:
          linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.78)),
          url("https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?w=1600")
            center/cover fixed !important;
        color: white !important;
        display: flex;
        flex-direction: column;
      }
      /* TOPBAR */
      .topbar {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        right: 0 !important;
        height: 64px !important;
        display: flex !important;
        align-items: center !important;
        justify-content: space-between !important;
        padding: 0 40px !important;
        background: rgba(0, 0, 0, 0.6) !important;
        backdrop-filter: blur(20px) !important;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
        z-index: 1000 !important;
      }
      .topbar-logo {
        display: flex !important;
        align-items: center !important;
        gap: 10px !important;
        text-decoration: none !important;
      }
      .topbar-logo img {
        height: 36px !important;
        width: 36px !important;
        border-radius: 50% !important;
        border: 1.5px solid #d4a017 !important;
        object-fit: contain !important;
        flex-shrink: 0 !important;
      }
      .topbar-logo-text,
      .topbar-logo > div {
        display: flex;
        flex-direction: column;
        gap: 1px;
      }
      .topbar-logo-name,
      .topbar-logo > span,
      .topbar-logo > div > span:first-child {
        font-size: 14px !important;
        font-weight: 800 !important;
        color: white !important;
        letter-spacing: 0.8px !important;
        line-height: 1 !important;
      }
      .topbar-logo span span,
      .topbar-logo-name span {
        color: #d4a017 !important;
      }
      .topbar-logo-sub,
      .topbar-logo > div > span:last-child {
        font-size: 9px !important;
        color: rgba(255, 255, 255, 0.42) !important;
        letter-spacing: 0.3px !important;
      }
      .topbar-right {
        display: flex !important;
        align-items: center !important;
        gap: 6px !important;
      }
      .topbar-btn,
      .back-link,
      .nav-btn {
        font-size: 12px !important;
        font-weight: 600 !important;
        color: rgba(255, 255, 255, 0.8) !important;
        text-decoration: none !important;
        padding: 7px 14px !important;
        border-radius: 7px !important;
        border: 1px solid rgba(255, 255, 255, 0.18) !important;
        background: rgba(255, 255, 255, 0.08) !important;
        transition: all 0.18s !important;
        cursor: pointer !important;
        font-family: "Inter", sans-serif !important;
        white-space: nowrap !important;
      }
      .topbar-btn:hover,
      .back-link:hover {
        background: rgba(255, 255, 255, 0.15) !important;
        color: white !important;
      }
      .btn-reset,
      .btn-save,
      .btn-submit {
        background: #8b1e3f !important;
        color: white !important;
        border: none !important;
      }
      .btn-reset:hover,
      .btn-save:hover {
        background: #7a1a37 !important;
      }
      /* CONTENT */
      .content {
        padding-top: 88px !important;
        max-width: 1100px;
        margin: 0 auto;
        padding-left: 40px;
        padding-right: 40px;
        padding-bottom: 48px;
        flex: 1;
      }
      /* CARDS */
      .owner-card,
      .form-card,
      .reset-card,
      .table-card,
      .danger-zone,
      .settings-card {
        background: rgba(255, 255, 255, 0.06) !important;
        border: 1px solid rgba(255, 255, 255, 0.12) !important;
        backdrop-filter: blur(10px) !important;
      }
      /* TEXT */
      h1,
      h2,
      h3,
      h4 {
        color: white !important;
      }
      p {
        color: rgba(255, 255, 255, 0.65) !important;
      }
      label,
      .form-label,
      .info-label,
      .section-label {
        color: rgba(255, 255, 255, 0.5) !important;
      }
      .info-value {
        color: white !important;
      }
      /* INPUTS */
      input,
      select,
      textarea {
        background: rgba(255, 255, 255, 0.08) !important;
        border: 1.5px solid rgba(255, 255, 255, 0.18) !important;
        color: white !important;
      }
      input::placeholder,
      textarea::placeholder {
        color: rgba(255, 255, 255, 0.35) !important;
      }
      select option {
        background: #1a1008;
        color: white;
      }
      input:focus,
      select:focus,
      textarea:focus {
        border-color: #d4a017 !important;
      }
      /* TABLE */
      thead th {
        color: rgba(255, 255, 255, 0.4) !important;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08) !important;
        background: transparent !important;
      }
      tbody tr {
        border-bottom: 1px solid rgba(255, 255, 255, 0.06) !important;
      }
      tbody tr:hover {
        background: rgba(255, 255, 255, 0.04) !important;
      }
      tbody td {
        color: rgba(255, 255, 255, 0.75) !important;
      }
      .prop-title,
      .owner-name-cell,
      .prop-name {
        color: white !important;
        font-weight: 600 !important;
      }
      .prop-loc,
      .owner-email,
      .prop-location {
        color: rgba(255, 255, 255, 0.4) !important;
      }
      /* BADGES */
      .active-badge.on,
      .status-Available {
        background: rgba(34, 197, 94, 0.15) !important;
        color: #86efac !important;
        border: 1px solid rgba(34, 197, 94, 0.3) !important;
      }
      .active-badge.off,
      .status-Rented {
        background: rgba(239, 68, 68, 0.15) !important;
        color: #fca5a5 !important;
        border: 1px solid rgba(239, 68, 68, 0.3) !important;
      }
      .status-Maintenance,
      .status-NotAvailable {
        background: rgba(234, 179, 8, 0.15) !important;
        color: #fde047 !important;
        border: 1px solid rgba(234, 179, 8, 0.3) !important;
      }
      /* FLASH */
      .flash.success {
        background: rgba(34, 197, 94, 0.15) !important;
        border: 1px solid rgba(34, 197, 94, 0.3) !important;
        color: #86efac !important;
      }
      .flash.danger {
        background: rgba(239, 68, 68, 0.15) !important;
        border: 1px solid rgba(239, 68, 68, 0.3) !important;
        color: #fca5a5 !important;
      }
      .flash.info {
        background: rgba(59, 130, 246, 0.15) !important;
        border: 1px solid rgba(59, 130, 246, 0.3) !important;
        color: #93c5fd !important;
      }
      .flash.warning {
        background: rgba(234, 179, 8, 0.15) !important;
        border: 1px solid rgba(234, 179, 8, 0.3) !important;
        color: #fde047 !important;
      }
      /* DANGER ZONE */
      .danger-zone {
        border: 1px solid rgba(239, 68, 68, 0.3) !important;
      }
      .danger-zone h2 {
        color: #f87171 !important;
      }
      .btn-danger,
      .btn-danger-outline {
        background: rgba(239, 68, 68, 0.15) !important;
        color: #f87171 !important;
        border: 1px solid rgba(239, 68, 68, 0.3) !important;
      }
      /* DIVIDERS */
      hr,
      .divider,
      [style*="border-bottom"] {
        border-color: rgba(255, 255, 255, 0.1) !important;
      }
      /* FOOTER */
      .page-footer {
        padding: 16px 40px;
        text-align: center;
        background: rgba(0, 0, 0, 0.45) !important;
        border-top: 1px solid rgba(255, 255, 255, 0.08) !important;
      }
      .page-footer p {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.3) !important;
      }
      @media (max-width: 768px) {
        .topbar {
          padding: 0 20px !important;
        }
        .content {
          padding: 80px 16px 32px !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="box">
      <span class="admin-badge">Admin</span>
      <p class="brand">Platform Admin</p>
      <p class="sub">Sign in to manage owners and platform settings.</p>
      {% with messages = get_flashed_messages(with_categories=true) %} {% for
      category, message in messages %}
      <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %} {% endwith %}
      <form method="POST" action="/admin/login">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
        <label>Email Address</label>
        <input
          type="email"
          name="email"
          placeholder="admin@platform.com"
          required
        />
        <label>Password</label>
        <input
          type="password"
          name="password"
          placeholder="••••••••"
          required
        />
        <button type="submit" class="btn">Sign In</button>
      </form>
      <div class="footer-row">
        <a href="/" class="back-link">Back to home</a>
      </div>
    </div>
    <footer class="page-footer">
      <p>© <span class="yr"></span> Shivya Spaces. All Rights Reserved.</p>
    </footer>
    <script>
      document
        .querySelectorAll(".yr")
        .forEach((e) => (e.textContent = new Date().getFullYear()));
    </script>
  </body>
</html>
