<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/static/Shivya_Logo.jpeg" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Add Property — ShivyaSpaces</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        min-height: 100vh;
      }
      body {
        font-family: "Inter", sans-serif;
        background:
          linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.78)),
          url("https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?w=1600")
            center/cover fixed;
        color: white;
        display: flex;
        flex-direction: column;
      }
      .topbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 40px;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        z-index: 1000;
      }
      .topbar-logo {
        display: flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
      }
      .topbar-logo img {
        height: 36px;
        width: 36px;
        border-radius: 50%;
        border: 1.5px solid #d4a017;
        object-fit: contain;
        flex-shrink: 0;
      }
      .topbar-logo-text {
        display: flex;
        flex-direction: column;
        gap: 1px;
      }
      .topbar-logo-name {
        font-size: 14px;
        font-weight: 800;
        color: white;
        letter-spacing: 0.8px;
        line-height: 1;
      }
      .topbar-logo-name span {
        color: #d4a017;
      }
      .topbar-logo-sub {
        font-size: 9px;
        color: rgba(255, 255, 255, 0.42);
      }
      .topbar-right {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .topbar-btn {
        font-size: 12px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.8);
        text-decoration: none;
        padding: 7px 14px;
        border-radius: 7px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.08);
        transition: all 0.18s;
        cursor: pointer;
        font-family: "Inter", sans-serif;
      }
      .topbar-btn:hover {
        background: rgba(255, 255, 255, 0.15);
        color: white;
      }
      .topbar-btn-danger {
        background: rgba(239, 68, 68, 0.15) !important;
        border-color: rgba(239, 68, 68, 0.35) !important;
        color: #f87171 !important;
      }
      .content {
        flex: 1;
        max-width: 600px;
        margin: 0 auto;
        padding: 88px 24px 60px;
        width: 100%;
        display: flex;
        flex-direction: column;
      }
      .back-wrap {
        margin-bottom: 24px;
        text-align: right;
      }
      .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.75);
        text-decoration: none;
        padding: 7px 16px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.08);
        transition: all 0.18s;
      }
      .back-btn:hover {
        background: rgba(255, 255, 255, 0.15);
        color: white;
      }
      .page-hdr {
        margin-bottom: 40px;
        text-align: center;
      }
      .page-hdr h1 {
        font-size: 28px;
        font-weight: 800;
        color: white;
        margin-bottom: 8px;
      }
      .page-hdr p {
        font-size: 15px;
        color: rgba(255, 255, 255, 0.55);
      }
      .choice-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .choice-card {
        display: block;
        padding: 32px 24px;
        border-radius: 20px;
        border: 2px solid rgba(255, 255, 255, 0.15);
        background: rgba(255, 255, 255, 0.07);
        text-decoration: none;
        transition: all 0.2s;
        text-align: center;
        cursor: pointer;
      }
      .choice-card:hover {
        border-color: #d4a017;
        background: rgba(212, 160, 23, 0.12);
        transform: translateY(-3px);
      }
      .choice-icon {
        font-size: 48px;
        margin-bottom: 16px;
      }
      .choice-title {
        font-size: 20px;
        font-weight: 800;
        color: white;
        margin-bottom: 8px;
      }
      .choice-card:hover .choice-title {
        color: #d4a017;
      }
      .choice-desc {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.5);
        line-height: 1.6;
      }
      .page-footer {
        padding: 16px 40px;
        text-align: center;
        background: rgba(0, 0, 0, 0.45);
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }
      .page-footer p {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.3);
      }
      @media (max-width: 600px) {
        .topbar {
          padding: 0 16px;
        }
        .content {
          padding: 80px 16px 40px;
        }
        .choice-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <a href="/" class="topbar-logo">
        <img src="/static/Shivya_Logo.jpeg" alt="" />
        <div class="topbar-logo-text">
          <span class="topbar-logo-name">SHIVYA<span>SPACES</span></span>
          <span class="topbar-logo-sub">Trusted Rental Lifecycle Platform</span>
        </div>
      </a>
      <div class="topbar-right">
        <form method="POST" action="/logout" style="display: inline">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
          <button type="submit" class="topbar-btn topbar-btn-danger">
            Sign Out
          </button>
        </form>
      </div>
    </div>
    <div class="content">
      <div class="back-wrap">
        <a href="/dashboard" class="back-btn">Back</a>
      </div>
      <div class="page-hdr">
        <h1>Add Property</h1>
        <p>What would you like to do with this property?</p>
      </div>
      <div class="choice-grid">
        <a href="/create/rent" class="choice-card">
          <div class="choice-icon">🏠</div>
          <div class="choice-title">For Rent</div>
          <div class="choice-desc">
            List a property or complex with monthly rental pricing
          </div>
        </a>
        <a href="/create/sale" class="choice-card">
          <div class="choice-icon">🏷️</div>
          <div class="choice-title">For Sale</div>
          <div class="choice-desc">
            List a property or individual units with a one-time sale price
          </div>
        </a>
      </div>
    </div>
    <footer class="page-footer">
      <p>© <span class="yr"></span> Shivya Spaces. All Rights Reserved.</p>
    </footer>
    <script>
      document.querySelectorAll(".yr").forEach(function (e) {
        e.textContent = new Date().getFullYear();
      });
    </script>
  </body>
</html>
